services:

  mongodb:
    image: mongo:7
    container_name: mongodb

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend

    ports:
      - "5002:5000"

    depends_on:
      - mongodb

  frontend:
    build: ./frontend

    ports:
      - "3000:3000"

volumes:
  mongo-data: