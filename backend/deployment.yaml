apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopping-backend
spec:
  replicas: 2

  selector:
    matchLabels:
      app: shopping-backend

  template:
    metadata:
      labels:
        app: shopping-backend

    spec:
      containers:
      - name: backend
        image: shopping-backend
        ports:
        - containerPort: 5001