apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopping-frontend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: shopping-frontend

  template:
    metadata:
      labels:
        app: shopping-frontend

    spec:
      containers:
      - name: frontend
        image: shopping-frontend

        ports:
        - containerPort: 3000